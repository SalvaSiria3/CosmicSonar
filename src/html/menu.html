<!DOCTYPE html>
<html lang="it">
<head>
    <title>Menu - Cosmic Sonar</title>
    <meta name="description" content="Menù principale del gioco Cosmic Sonar, un gioco arcade ambientato sullo spazio con alieni. Accessibile anche a persone con disabilità visiva, con controlli semplici.">
    <meta name="keywords" content="Cosmic Sonar, gioco arcade, navicella spaziale, alieni, sopravvivenza, accessibilità, menu">
    [!HEAD!]
</head>
<body>
    [!HEADER!]

    <div class="arcade-container zoomed no-transition">
        <img src="src/assets/images/cabinato.svg" alt="" aria-hidden="true" class="arcade-image">
        
        <div class="arcade-screen">
            <div class="screen-content">
                <main id="main-content" class="menu-container" tabindex="-1">
                    <h1 class="menu-title">Menù Principale</h1>
                    <p class="menu-subtitle"><span aria-hidden="true">(</span>scegli un'opzione<span aria-hidden="true">)</span></p>

                    <div class="menu-options" role="group" aria-label="Opzioni di navigazione">
                        <a href="tutorial.php" class="arcade-btn menu-option">
                            <span class="menu-icon icon-tutorial" aria-hidden="true"></span>
                            <span class="menu-option-title">Tutorial</span>
                        </a>
                        <a href="game.php" class="arcade-btn menu-option">
                            <span class="menu-icon icon-game" aria-hidden="true"></span>
                            <span class="menu-option-title">Gioco</span>
                        </a>
                        <a href="leaderboard.php" class="arcade-btn menu-option">
                            <span class="menu-icon icon-leaderboard" aria-hidden="true"></span>
                            <span class="menu-option-title">Classifica</span>
                        </a>
                        <button type="button" id="open-settings-btn" class="arcade-btn menu-option" aria-haspopup="dialog" aria-controls="settings-modal">
                            <span class="menu-icon icon-settings" aria-hidden="true"></span>
                            <span class="menu-option-title">Impostazioni</span>
                        </button>
                    </div>

                    <!-- Schermata Impostazioni (Modale) -->
                    <div id="settings-modal" class="hide" role="dialog" aria-modal="true" aria-labelledby="settings-title">
                        <h2 id="settings-title" class="menu-title">Impostazioni</h2>
                        <div class="settings-content">
                            <div class="volume-control">
                                <label for="sfx-volume" aria-hidden="true">Effetti Sonori</label>
                                <input type="range" id="sfx-volume" aria-label="Volume Effetti Sonori" min="0" max="10" step="1" value="9" aria-valuemin="0" aria-valuemax="10" aria-valuenow="9">
                            </div>
                            <div class="volume-control">
                                <label for="music-volume" aria-hidden="true">Musica</label>
                                <input type="range" id="music-volume" aria-label="Volume Musica" min="0" max="10" step="1" value="1" aria-valuemin="0" aria-valuemax="10" aria-valuenow="1">
                            </div>
                        </div>
                        <button type="button" id="close-settings-btn" class="arcade-btn">Chiudi</button>
                    </div>
                </main>
            </div>
        </div>

        [!FOOTER!]
    </div>

    [!WARNING!]

    <!-- Banner per attivare l'audio se bloccato dal browser -->
    <aside class="start-banner hidden" id="audioBanner" role="alert">
        <p class="start-banner-text">
            Premi un <span class="tasto">tasto</span> o fai un <span class="tasto">click</span> ovunque per la <strong>musica</strong>
        </p>
    </aside>

    <div class="stars" aria-hidden="true"></div>
    <div class="grid-background" aria-hidden="true"></div>
</body>
</html>
