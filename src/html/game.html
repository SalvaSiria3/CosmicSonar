<!DOCTYPE html>
<html lang="it">
<head>
    <title>Gioco - Cosmic Sonar</title>
    <meta name="description" content="Partita a Cosmic Sonar. Sopravvivi il più a lungo possibile agli alieni basandoti sull'audio spaziale.">
    <meta name="keywords" content="Cosmic Sonar, gioco, arcade, audio, sopravvivenza">
    [!HEAD!]
</head>
<body>
    [!HEADER!]

    <div class="arcade-container zoomed" style="transition: none;">
        <img src="src/assets/images/cabinato.svg" alt="" aria-hidden="true" class="arcade-image">
        
        <div class="arcade-screen">
            <div class="screen-content">
                <main id="main-content" tabindex="-1">
                    <h1 class="sr-only">Partita in corso</h1>

                    <div id="loading-screen" class="loading-container">
                        <img src="src/assets/images/logo_senza_sfondo.png" alt="" aria-hidden="true" class="loading-logo">
                        <div class="progress-wrapper">
                            <div class="progress-bar-container">
                                <div id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-labelledby="loading-text"></div>
                            </div>
                            <p id="loading-percentage" aria-hidden="true">0%</p>
                        </div>
                        <p id="loading-text" aria-live="polite">Caricamento in corso...</p>
                    </div>

                    <div id="topbargame" style="display: none;">
                        <div class="score-container" aria-live="polite" aria-atomic="true">
                            <span class="sr-only">Punteggio: </span>
                            <span id="score">0000</span>
                        </div>
                        <div class="lives-container" role="group" aria-label="Vite: 3" id="lives-container">
                            <img src="src/assets/images/heart_full.png" alt="" class="heart-icon" id="life-3">
                            <img src="src/assets/images/heart_full.png" alt="" class="heart-icon" id="life-2">
                            <img src="src/assets/images/heart_full.png" alt="" class="heart-icon" id="life-1">
                        </div>
                        <button type="button" class="settings-btn" aria-label="Impostazioni" title="Impostazioni">
                            <span class="icon-settings" aria-hidden="true"></span>
                        </button>
                    </div>

                    <div id="game-area" style="display: none;" aria-hidden="true">
                        <div class="lane" id="lane-left"></div>
                        <div class="lane" id="lane-center"></div>
                        <div class="lane" id="lane-right"></div>
                    </div>
                </main>
            </div>
        </div>

        [!FOOTER!]
    </div>

    <div class="resize-warning" role="alert">
        <p>⚠️ Risoluzione non supportata.<br><br>Rimpicciolisci o ingrandisci<br>la finestra per giocare.</p>
    </div>

    <div class="stars" aria-hidden="true"></div>
    <div class="grid-background" aria-hidden="true"></div>

    <!-- Script per la logica di caricamento -->
    <script src="src/js/game/loader.js" defer></script>
</body>
</html>
