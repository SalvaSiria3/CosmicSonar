<!DOCTYPE html>
<html lang="it">
<head>
    <title>Classifica - Cosmic Sonar</title>
    <meta name="description" content="Classifica globale di Cosmic Sonar. Scopri i migliori punteggi dei giocatori in modalità classica e difficile.">
    <meta name="keywords" content="Classifica, Cosmic Sonar, punteggi, record, leaderboard">
    [!HEAD!]
</head>
<body>
    [!HEADER!]

    <div class="arcade-container zoomed no-transition">
        <img src="src/assets/images/cabinato.svg" alt="" aria-hidden="true" class="arcade-image">
        
        <div class="arcade-screen">
            <div class="screen-content">
                <main id="main-content" class="leaderboard-container" tabindex="-1">
                    <div class="leaderboard-header">
                        <img src="src/assets/images/logo_senza_sfondo.png" alt="" aria-hidden="true" class="leaderboard-logo">
                        <h1 class="menu-title leaderboard-title">CLASSIFICA</h1>
                    </div>
                    
                    <hr class="leaderboard-divider" aria-hidden="true">
                    
                    <div class="leaderboard-filters" role="group" aria-label="Filtra per modalità">

                        <button type="button" id="filter-hard" class="arcade-btn filter-btn" aria-pressed="false">Difficile</button>
                    </div>
                    
                    <!-- La classifica viene generata in JS -->
                    <ul id="leaderboard-list" class="leaderboard-list" aria-label="Migliori Punteggi"></ul>
                    
                    <div class="leaderboard-actions" role="group" aria-label="Azioni classifica">

                        <a href="game.php" class="arcade-btn play-again-btn">Gioca di nuovo</a>
                    </div>
                </main>
            </div>
        </div>

        [!FOOTER!]
    </div>

    [!WARNING!]

    <!-- Banner per attivare l'audio se bloccato dal browser -->

            Premi un <span class="tasto">tasto</span> o fai un <span class="tasto">click</span> ovunque per la <strong>musica</strong>
        </p>
    </aside>

    <div class="stars" aria-hidden="true"></div>
    <div class="grid-background" aria-hidden="true"></div>
    <script src="src/js/ui/leaderboard.js" defer></script>
