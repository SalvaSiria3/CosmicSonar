<!DOCTYPE html>
<html lang="it">
    <head>
        <title>Home - Cosmic Sonar</title>
        <meta name="description" content="Cosmic Sonar è un gioco arcade in cui i giocatori sono una navicella spaziale e devono evitare gli alieni per sopravvivere il più a lungo possibile. Accessibile anche a persone con disabilità visiva, con controlli semplici.">
        <meta name="keywords" content="Cosmic Sonar, gioco arcade, navicella spaziale, alieni, sopravvivenza, accessibilità">
        [!HEAD!]
    </head>
    <body>
        [!HEADER!]

        <main id="main-content" class="arcade-container" tabindex="-1">
            <img src="src/assets/images/cabinato.svg" alt="" aria-hidden="true" class="arcade-image">
            
            <div class="arcade-screen">
                <div class="screen-content">
                    <h1 class="insert-coin">Inserisci<br>moneta</h1>
                </div>
            </div>

            [!FOOTER!]
        </main>

        <div class="stars" aria-hidden="true"></div>
        <div class="grid-background" aria-hidden="true"></div>

    <p class="sr-only" aria-live="polite" id="status-message">
        Premi la barra spaziatrice per iniziare il gioco
    </p>
    
    <!-- Banner per capire cosa fare -->
    <aside class="start-banner" id="startBanner" role="complementary" aria-label="Istruzioni per iniziare">
        <p class="start-banner-text">
            Clicca <span class="tasto" aria-label="tasto spazio">SPAZIO</span> per iniziare
        </p>
    </aside>

    <div class="resize-warning" role="alert">
        <p>⚠️ Risoluzione non supportata.<br><br>Rimpicciolisci o ingrandisci<br>la finestra per giocare.</p>
    </div>


    </body>
</html>
