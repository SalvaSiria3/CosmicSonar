<!DOCTYPE html>
<html lang="it">
    <head>
        <title>Home - Cosmic Sonar</title>
        <meta name="description" content="Cosmic Sonar è un videogioco arcade accessibile basato sull'audio 3D. Sopravvivi agli alieni nello spazio profondo!">
        <meta name="keywords" content="Cosmic Sonar, gioco arcade, audio 3D, accessibilità, non vedenti, sopravvivenza">
        [!HEAD!]
    </head>
    <body>
        [!HEADER!]

        <div class="arcade-container">
            <img src="src/assets/images/cabinato.svg" alt="" aria-hidden="true" class="arcade-image">
            
            <div class="arcade-screen">
                <div class="screen-content">
                    <main id="main-content" tabindex="-1">
                        <h1 class="insert-coin"> <!-- Sennò lo screen reader legge "due elementi"-->
                            <span class="sr-only">Inserisci moneta</span>
                            <span aria-hidden="true">Inserisci<br>moneta</span>
                        </h1>
                        <p class="sr-only" aria-live="polite" id="status-message">
                            Premi la barra spaziatrice per iniziare il gioco
                        </p>
                    </main>
                </div>
            </div>

            [!FOOTER!]
        </div>

        <div class="stars" aria-hidden="true"></div>
        <div class="grid-background" aria-hidden="true"></div>

    <aside class="start-banner" id="startBanner" aria-hidden="true">
        <p class="start-banner-text">
            Clicca <span class="sr-only">la barra spaziatrice</span><span class="tasto" aria-hidden="true">SPAZIO</span> per iniziare
        </p>
    </aside>

    [!WARNING!]


    </body>
</html>
