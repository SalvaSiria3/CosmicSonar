<!DOCTYPE html>
<html lang="it"></html>
    <head>
        <title>Cosmic Sonar</title>
        <meta name="description" content="Cosmic Sonar è un gioco arcade in cui i giocatori sono una navicella spaziale e devono evitare gli alieni per sopravvivere il più a lungo possibile.">
        <meta name="keywords" content="Cosmic Sonar, gioco arcade, navicella spaziale, alieni, sopravvivenza, accessibilità">
        [!HEAD!]
    </head>
    <body>
        [!HEADER!]

        <div class="arcade-container">
            <img src="src/assets/images/cabinato.svg" alt="Cabinato Arcade del gioco Cosmic Sonar" class="arcade-image">
            
            <div class="arcade-screen">
                <img src="src/assets/images/background_screen.png" alt="Sfondo dello schermo" class="screen-bg">
                <div class="screen-content">
                    <p class="insert-coin">Inserisci<br>moneta</p>
                </div>
            </div>

            [!FOOTER!]
        </div>

        <div class="stars" aria-hidden="true"></div>
        <div class="grid-background" aria-hidden="true"></div>

    <p class="sr-only" aria-live="polite" id="status-message">
        Premi la barra spaziatrice per iniziare il gioco
    </p>
    
    <!-- Start banner -->
    <aside class="start-banner" id="startBanner" role="complementary" aria-label="Istruzioni per iniziare">
        <p class="start-banner-text">
            Clicca <span class="tasto-spazio" aria-label="tasto spazio">SPAZIO</span> per iniziare
        </p>
    </aside>

    <div class="resize-warning" aria-hidden="true">
        <p>⚠️ Risoluzione non supportata.<br><br>Rimpicciolisci o ingrandisci<br>la finestra per giocare.</p>
    </div>

    </body>
</html>
