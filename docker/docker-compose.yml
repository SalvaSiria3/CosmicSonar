services:
  db:
    image: mysql:8.0
    container_name: cosmicsonar_mysql
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cosmicsonar_db
      MYSQL_USER: cosmicsonar_user
      MYSQL_PASSWORD: cosmicsonar_password
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql
    restart: always

  # servizio web (apache + PHP)
  www:
    build: .
    container_name: cosmicsonar_app
    platform: linux/amd64
    ports:
      - "8080:80"             # mappa la porta 8080 alla 80 del container
    volumes:
      - ../:/var/www/html   # sincronizza la cartella src locale con la root di apache
    depends_on:
      - db                   # aspetta che il DB parta prima di avviare apache      
    restart: always                  

  # interfaccia Grafica DB (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cosmicsonar_pma
    platform: linux/amd64
    links:
      - db:db
    ports:
      - "8081:80" # porta 8081 per non andare in conflitto con il sito (8080)
    environment:
      PMA_HOST: db            # dice a phpMyAdmin di connettersi al servizio 'db'!!!
      MYSQL_ROOT_PASSWORD: rootpassword
    restart: always